services:

    php:

        build:
            context: .
            dockerfile: docker/php/Dockerfile

        volumes:
            - .:/var/www/html

    nginx:

        image: nginx:latest

        ports:
            - "8000:80"

        volumes:
            - .:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

        depends_on:
            - php

    database:

        image: mysql:8

        environment:

            MYSQL_DATABASE: symfony_sms

            MYSQL_ROOT_PASSWORD: root

        ports:
            - "3306:3306"

        volumes:
            - db_data:/var/lib/mysql

volumes:

    db_data:
